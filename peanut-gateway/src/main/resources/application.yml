spring:
  application:
    name: peanut-gateway
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/peanut_trace?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: root123456
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      timeout: 3000ms
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath*:mapper/*.xml
  global-config:
    db-config:
      logic-delete-field: isDeleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: peanut-trace-system-secret-key-2026-secure
  expiration: 86400000

knife4j:
  enable: true
  setting:
    language: zh_cn

logging:
  level:
    com.peanut.trace: info
  file:
    name: logs/peanut-trace.log
